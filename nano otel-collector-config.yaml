receivers:
  otlp:
    protocols:
      http:                       # écoute sur 4318/tcp
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlphttp:
    endpoint: https://organic-capybara-69jwv5ww6qgr2rx75-14318.app.github.dev/   # URL vers Jaeger port 4318
  logging:
    loglevel: info

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp, logging]
